<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Board Directory</title>

  <!-- DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f1f5f9;
    }
    .panel {
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .rotate {
      transform: rotate(90deg);
    }
  </style>
</head>

<body class="p-6">

<div class="max-w-4xl mx-auto">
  <h1 class="text-2xl font-bold">Board Directory</h1>
  <div class="h-1 w-24 bg-blue-600 my-3 rounded"></div>

  <div class="space-y-4">

    <!-- Trackers -->
    <button class="section bg-blue-600 text-white rounded-xl px-5 py-4 flex justify-between items-center w-full"
      data-target="trackers">
      <span class="flex items-center gap-2 font-semibold">
        <i data-lucide="activity"></i> Trackers
      </span>
      <i data-lucide="arrow-right" class="chevron transition-transform"></i>
    </button>
    <div id="trackers" class="panel max-h-0 bg-white rounded-xl shadow px-4 py-3 space-y-2">
      <a href="https://motionpictures.monday.com/boards/1861276763" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">K&T Tracker</a>
      <a href="https://motionpictures.monday.com/boards/1789025441" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">Criminal Referrals</a>
      <a href="https://motionpictures.monday.com/boards/1788262726" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">Application Takedowns</a>
      <a href="https://motionpictures.monday.com/boards/1797290553" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">IWL</a>
    </div>

    <!-- Reporting -->
    <button class="section bg-cyan-600 text-white rounded-xl px-5 py-4 flex justify-between items-center w-full"
      data-target="reporting">
      <span class="flex items-center gap-2 font-semibold">
        <i data-lucide="bar-chart-3"></i> Reporting
      </span>
      <i data-lucide="arrow-right" class="chevron transition-transform"></i>
    </button>
    <div id="reporting" class="panel max-h-0 bg-white rounded-xl shadow px-4 py-3 space-y-2">
      <a href="https://motionpictures.monday.com/boards/1909180597" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">Weekly Updates</a>
      <a href="https://motionpictures.monday.com/boards/5092300043" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">ACE Action Plans & Litigation Strategy</a>
      <a href="https://motionpictures.monday.com/boards/1860764866" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">Repository</a>
    </div>

    <!-- Landscapes -->
    <button class="section bg-purple-600 text-white rounded-xl px-5 py-4 flex justify-between items-center w-full"
      data-target="landscapes">
      <span class="flex items-center gap-2 font-semibold">
        <i data-lucide="map"></i> Landscapes
      </span>
      <i data-lucide="arrow-right" class="chevron transition-transform"></i>
    </button>
    <div id="landscapes" class="panel max-h-0 bg-white rounded-xl shadow px-4 py-3 space-y-2">
      <a href="https://motionpictures.monday.com/boards/2140925236" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">Top List Directory</a>
      <a href="https://motionpictures.monday.com/boards/2125862831" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">APAC IPTV</a>
      <a href="https://motionpictures.monday.com/boards/2116342394" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">APAC Streaming</a>
    </div>

    <!-- GSS -->
    <button class="section bg-emerald-600 text-white rounded-xl px-5 py-4 flex justify-between items-center w-full"
      data-target="gss">
      <span class="flex items-center gap-2 font-semibold">
        <i data-lucide="shield-alert"></i> GSS
      </span>
      <i data-lucide="arrow-right" class="chevron transition-transform"></i>
    </button>
    <div id="gss" class="panel max-h-0 bg-white rounded-xl shadow px-4 py-3 space-y-2">
      <a href="https://motionpictures.monday.com/boards/1735781645" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">SB Around the World</a>
      <a href="https://motionpictures.monday.com/boards/1901785736" target="_blank" class="block rounded-lg p-3 hover:bg-slate-50">SB Cases</a>
    </div>

  </div>
</div>

<script>
  lucide.createIcons();

  document.querySelectorAll('.section').forEach(btn => {
    btn.addEventListener('click', () => {
      const panel = document.getElementById(btn.dataset.target);

      document.querySelectorAll('.panel').forEach(p => {
        if (p !== panel) p.style.maxHeight = null;
      });

      document.querySelectorAll('.chevron').forEach(c => c.classList.remove('rotate'));

      if (!panel.style.maxHeight) {
        panel.style.maxHeight = panel.scrollHeight + 'px';
        btn.querySelector('.chevron').classList.add('rotate');
      }
    });
  });
</script>

</body>
</html>
``
