<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Directory</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f1f5f9; margin: 0; }
    .panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .chevron { transition: transform 0.3s ease; }
    .rotate { transform: rotate(180deg); }
    .board-link { display: block; padding: 10px 0; color: #0f172a; text-decoration: none; cursor: pointer; }
    .board-link:hover { text-decoration: underline; }
    .board-link + .board-link { border-top: 1px solid #e2e8f0; }
  </style>
</head>

<body class="p-4">
<div class="max-w-3xl mx-auto">
<div class="space-y-4">

<!-- Trackers -->
<div>
<button class="accordion-btn w-full bg-blue-600 text-white rounded-2xl px-5 py-4 flex justify-between items-center" data-target="trackers">
<span class="flex gap-3 items-center font-semibold text-lg">
<i data-lucide="activity"></i> Trackers
</span>
<i data-lucide="chevron-right" class="chevron"></i>
</button>

<div id="trackers" class="panel mt-2">
<div class="bg-white rounded-2xl shadow-sm px-6 py-3">
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1861276763'">K&T Tracker</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1789025441'">Criminal Referrals</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1788262726'">Application Takedowns</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1797290553'">IWL</a>
</div>
</div>
</div>

<!-- Reporting -->
<div>
<button class="accordion-btn w-full bg-cyan-600 text-white rounded-2xl px-5 py-4 flex justify-between items-center" data-target="reporting">
<span class="flex gap-3 items-center font-semibold text-lg">
<i data-lucide="bar-chart-3"></i> Reporting
</span>
<i data-lucide="chevron-right" class="chevron"></i>
</button>

<div id="reporting" class="panel mt-2">
<div class="bg-white rounded-2xl shadow-sm px-6 py-3">
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1909180597'">Weekly Updates</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/5092300043'">ACE Action Plans & Litigation Strategy</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1860764866'">Repository</a>
</div>
</div>
</div>

<!-- Landscapes -->
<div>
<button class="accordion-btn w-full bg-purple-600 text-white rounded-2xl px-5 py-4 flex justify-between items-center" data-target="landscapes">
<span class="flex gap-3 items-center font-semibold text-lg">
<i data-lucide="map"></i> Landscapes
</span>
<i data-lucide="chevron-right" class="chevron"></i>
</button>

<div id="landscapes" class="panel mt-2">
<div class="bg-white rounded-2xl shadow-sm px-6 py-3">
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/2140925236'">Top List Directory</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/5090009562'">APP Landscapes</a>
</div>
</div>
</div>

<!-- GSS -->
<div>
<button class="accordion-btn w-full bg-emerald-600 text-white rounded-2xl px-5 py-4 flex justify-between items-center" data-target="gss">
<span class="flex gap-3 items-center font-semibold text-lg">
<i data-lucide="shield-check"></i> GSS
</span>
<i data-lucide="chevron-right" class="chevron"></i>
</button>

<div id="gss" class="panel mt-2">
<div class="bg-white rounded-2xl shadow-sm px-6 py-3">
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1735781645'">SB Around the World</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1901785736'">SB Cases</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1736947920'">CJEU Overview</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/2073211338'">AI & Copyright Case Law</a>
<a class="board-link" onclick="window.top.location.href='https://motionpictures.monday.com/boards/1959576984'">Member Action Required (GSS)</a>
</div>
</div>
</div>

<div class="border-t border-slate-300 my-2"></div>

<a onclick="window.top.location.href='https://wkf.ms/3KzCIBi'"
class="inline-block bg-blue-100 text-blue-700 rounded-xl px-4 py-2 text-sm font-semibold hover:bg-blue-200 transition">
Submit APK for Takedown
</a>

</div>
</div>

<script>
lucide.createIcons();

document.querySelectorAll('.accordion-btn').forEach(btn => {
btn.addEventListener('click', () => {
const panel = document.getElementById(btn.dataset.target);
const icon = btn.querySelector('.chevron');
const isOpen = panel.style.maxHeight;

document.querySelectorAll('.panel').forEach(p => p.style.maxHeight = null);
document.querySelectorAll('.chevron').forEach(c => c.classList.remove('rotate'));

if (!isOpen) {
panel.style.maxHeight = panel.scrollHeight + 'px';
icon.classList.add('rotate');
}
});
});
</script>

</body>
</html>
